services:
  hr_api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file: .env.dev
    environment:
      # Run Solid Queue supervisor inside Puma (same pattern as production docker-compose).
      SOLID_QUEUE_IN_PUMA: "1"
    depends_on:
      hrdb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle

  hrdb:
    image: postgres:18
    env_file: .env.dev
    ports:
      - "5432:5432"
    volumes:
      - hr_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - hr_redis_data:/data

  # Not started by default (`docker compose up`). Same image as hr_api but no web server.
  # One-off: docker compose -f docker-compose.dev.yml --profile test run --rm hr_api_test bundle exec rspec
  # Shell + DB ready: docker compose -f docker-compose.dev.yml --profile test up -d hr_api_test
  hr_api_test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.test
    environment:
      RAILS_ENV: test
    depends_on:
      hrdb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    command: ["sleep", "infinity"]

volumes:
  hr_db_data:
  hr_redis_data:
  bundle_cache:
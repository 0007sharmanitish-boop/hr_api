# Solid Queue recurring tasks. Requires a running supervisor (SOLID_QUEUE_IN_PUMA=1 or bin/jobs).
# https://github.com/rails/solid_queue#recurring-tasks

development:
  purge_expired_jwt_denylist:
    class: JwtDenylistCleanupJob
    schedule: every day at 3:30am

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

production:
  purge_expired_jwt_denylist:
    class: JwtDenylistCleanupJob
    schedule: every day at 3:30am

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
